  <!-- Branded Header Override: Replace dull React header with stunning branded section -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    .iddu-branded-header {
      position: sticky;
      top: 0;
      z-index: 200;
      padding: 0;
      border-bottom: 1px solid rgba(168, 85, 247, 0.15);
      background: linear-gradient(135deg, rgba(2, 6, 23, 0.97), rgba(15, 23, 42, 0.95));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    .iddu-branded-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(ellipse 600px 200px at 10% 50%, rgba(56, 189, 248, 0.08), transparent),
        radial-gradient(ellipse 600px 200px at 90% 50%, rgba(168, 85, 247, 0.08), transparent);
      pointer-events: none;
    }

    .iddu-branded-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg,
          transparent,
          rgba(56, 189, 248, 0.4) 20%,
          rgba(168, 85, 247, 0.6) 50%,
          rgba(56, 189, 248, 0.4) 80%,
          transparent);
      animation: headerShimmer 4s ease-in-out infinite;
    }

    @keyframes headerShimmer {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    .iddu-header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.2rem;
      position: relative;
      z-index: 1;
      gap: 1.5rem;
    }

    .iddu-brand-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .iddu-logo-wrap {
      position: relative;
    }

    .iddu-logo-wrap img {
      height: 42px;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(168, 85, 247, 0.5)) drop-shadow(0 0 6px rgba(56, 189, 248, 0.3));
    }

    .iddu-pronunciation {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .iddu-phonetic {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #38bdf8, #a855f7, #ec4899);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 3s ease-in-out infinite;
    }

    @keyframes gradientShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    .iddu-meaning {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.55);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .iddu-meaning em {

    }

    .iddu-value-prop {

      max-width: 520px;
      text-align: right;
    }

    .iddu-tagline {

      font-weight: 600;

    /* Mobile responsive */
    @media (max-width: 640px) {

        align-items: flex-start;
        gap: 0.7rem;
        padding: 0.8rem 1rem;

      }

      .iddu-phonetic {
        font-size: 0.95rem;
      }
    }
  </style>

  <script>
    (function () {
      function replaceHeader() {
        var root = document.getElementById('root');
        if (!root || !root.children.length) return false;

        // Find the React header element
        var header = root.querySelector('header');
        if (!header) return false;

        // Don't inject twice
        if (document.querySelector('.iddu-branded-header')) return true;

        // Create the new branded header
        var newHeader = document.createElement('div');
        newHeader.className = 'iddu-branded-header';
        newHeader.innerHTML = `
          <div class="iddu-header-inner">
            <div class="iddu-brand-left">
              <div class="iddu-logo-wrap">
                <img src="/images/iddu-logo.png" alt="iddu logo" />
              </div>
              <div class="iddu-pronunciation">
                <span class="iddu-phonetic">/aɪ duː/ — "I do"</span>
                <span class="iddu-meaning"><em>I do it for you.</em></span>
              </div>
            </div>
            <div class="iddu-value-prop">
              <div style="font-size: 0.8rem; color: rgba(255,255,255,0.6); margin-bottom: 6px; text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 6px;">
                 <span>Questions?</span> <a href="mailto:admin@iddu.app" style="color: #38bdf8; text-decoration: none; font-weight: 500; transition: color 0.2s;">admin@iddu.app</a>
              </div>
              <div class="iddu-tagline">
                Your AI-powered assistant that <span class="highlight">handles your busy schedule</span> — so you don't have to,
                Let 'I do' handle it
              </div>
            </div>
          </div>
        `;

        // Replace the React header
        header.style.display = 'none';
        header.parentElement.insertBefore(newHeader, header);

        return true;
      }

      var obs = new MutationObserver(function (m, o) {
        if (replaceHeader()) o.disconnect();
      });
      obs.observe(document.getElementById('root'), { childList: true, subtree: true });
      window.addEventListener('load', function () { setTimeout(replaceHeader, 400); });
    })();
  </script>

  <!-- Hero Highlight Cards: Fill empty space in left column below chips -->
  <script>
    (function () {
      function injectHeroHighlights() {
        var root = document.getElementById('root');
        if (!root || !root.children.length) return false;

        // Find chips container
        var chips = root.querySelectorAll('.chip');
        if (!chips.length) return false;
        var chipsContainer = chips[0].parentElement;
        if (!chipsContainer) return false;

        // Don't inject twice
        if (chipsContainer.parentElement.querySelector('.hero-highlights')) return true;

        var leftCol = chipsContainer.parentElement;

        // Create highlights container
        var container = document.createElement('div');
        container.className = 'hero-highlights';
        container.style.cssText = 'display:flex;flex-direction:column;gap:0.55rem;margin-top:1.5rem;';

        var highlights = [
          {
            icon: '📧',
            title: 'Smart Email Parsing',
            desc: 'Forward appointment emails to your personal inbox — iddu extracts dates, times & provider details automatically'
          },
          {
            icon: '🤖',
            title: 'AI Phone Agent',
            desc: 'iddu calls the office, speaks to staff, and reschedules your appointments — completely hands-free'
          },
          {
            icon: '📸',
            title: 'Camera & Voice Input',
            desc: 'Snap a paper slip or just speak naturally — iddu understands and creates beautiful appointment cards'
          }
        ];

        highlights.forEach(function (h, i) {
          var card = document.createElement('div');
          card.style.cssText =
            'display:flex;align-items:flex-start;gap:0.75rem;padding:0.75rem 1rem;' +
            'background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);' +
            'border-radius:12px;opacity:0;animation:heroCardIn 0.5s ease forwards;' +
            'animation-delay:' + (i * 0.15) + 's;';

          var iconEl = document.createElement('span');
          iconEl.style.cssText = 'font-size:1.35rem;line-height:1;flex-shrink:0;margin-top:2px;';
          iconEl.textContent = h.icon;

          var textWrap = document.createElement('div');

          var titleEl = document.createElement('div');
          titleEl.style.cssText = 'font-weight:600;font-size:0.82rem;color:rgba(255,255,255,0.92);margin-bottom:2px;';
          titleEl.textContent = h.title;

          var descEl = document.createElement('div');
          descEl.style.cssText = 'font-size:0.74rem;color:rgba(255,255,255,0.48);line-height:1.35;';
          descEl.textContent = h.desc;

          textWrap.appendChild(titleEl);
          textWrap.appendChild(descEl);
          card.appendChild(iconEl);
          card.appendChild(textWrap);
          container.appendChild(card);
        });

        // Inject keyframes
        if (!document.getElementById('hero-card-anim')) {
          var style = document.createElement('style');
          style.id = 'hero-card-anim';
          style.textContent = '@keyframes heroCardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}';
          document.head.appendChild(style);
        }

        leftCol.appendChild(container);
        return true;
      }

      var obs = new MutationObserver(function (m, o) {
        if (injectHeroHighlights()) o.disconnect();
      });
      obs.observe(document.getElementById('root'), { childList: true, subtree: true });
      window.addEventListener('load', function () { setTimeout(injectHeroHighlights, 600); });
    })();
  </script>

  <!-- Voice Agent Demo: Replace hero phone mockup with animated demo -->
  <script>
    (function () {
      function replaceHeroMockup() {
        const root = document.getElementById('root');
        if (!root || !root.children.length) return false;

        // Find the hero phone mockup: it's a div.glass with "My Appointments" text
        const glassDivs = root.querySelectorAll('.glass');
        let mockup = null;

        for (const glass of glassDivs) {
          const text = glass.textContent || '';
          if (text.includes('My Appointments')) {
            // Verify it's the phone-sized one (width ~260px), not the outer hero glass
            const rect = glass.getBoundingClientRect();
            if (rect.width < 400 && rect.height < 600) {
              mockup = glass;
              break;
            }
          }
        }

        if (!mockup) return false;

        // Get the container that holds the mockup (the flex centering wrapper)
        const mockupContainer = mockup.parentElement;

        // Create the iframe to replace the static mockup
        const iframe = document.createElement('iframe');
        iframe.src = '/demo/voice-agent-demo.html';
        iframe.title = 'IDDU Voice Agent Demo';
        iframe.loading = 'lazy';
        iframe.style.cssText = `
          width: 340px;
          height: 720px;
          border: none;
          border-radius: 44px;
          overflow: hidden;
          background: #0a0a0f;
        `;

        // Replace the static mockup with the animated iframe
        mockupContainer.replaceChild(iframe, mockup);

        return true;
      }

      // Wait for React to render
      const observer = new MutationObserver(function (mutations, obs) {
        if (replaceHeroMockup()) {
          obs.disconnect();
        }
      });

      observer.observe(document.getElementById('root'), {
        childList: true,
        subtree: true
      });

      // Fallback: try after DOM load
      window.addEventListener('load', function () {
        setTimeout(replaceHeroMockup, 500);
      });
    })();
  </script>

      // Inject after load to ensure it's at the bottom
